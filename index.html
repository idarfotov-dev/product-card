<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <title>Product Card</title>
</head>
<body>
    <div class="wrapper">
        <h1 class="product-card_main-title">Выбери свой продукт</h1>
        <div class="buttons-container">
            <button class="styles-for-buttons" id="recolor-first-card-button">Поменять цвет первой карточки</button>
            <button class="styles-for-buttons" id="recolor-all-cards-button">Помпнять цвет всех карточек</button>
            <button class="styles-for-buttons" id="open-google-button">Перейти на сайт Google</button>
            <button class="styles-for-buttons" id="multicolored-button">Помпнять цвет кнопки</button>
        </div>
        <div class="product-card_container">
            <template id="card-tamplate">
                <div class="product-card">
                    <img src="" alt="" class="product-card_img">
                    <p class="product-card_type"></p>
                    <h3 class="product-card_title"></h3>
                    <p class="product-card_description"></p>
                    <span class="product-card_composition">Состав:</span>
                    <ul class="product-card_list"></ul>
                    <div class="product-card_price-block">
                        <span class="product-card_price-text">Цена</span>
                        <span class="product-card_price"></span>
                    </div>
                </div>
            </template>
        </div>
    </div>
    <!-- <script src="js/main.js"></script> -->
    <!-- <script src="js/homework-5.js"></script> -->
    <!-- <script src="js/homework-6.js"></script> -->
    <!-- <script src="js/homework-7.js" type="module"></script> -->
    <script src="js/homework-8.js" type="module"></script>
</body>
</html>
